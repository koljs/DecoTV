name: Build Mobile Deploy Package

on:
  workflow_dispatch:
    inputs:
      build_for_arm:
        description: '构建 ARM64 部署包 (手机端)'
        required: false
        default: true
        type: boolean
  push:
    branches: [main, master]
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - '.github/workflows/docker-image.yml'
      - '.github/workflows/label-sync.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  actions: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Extract version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          BUILD_TIMESTAMP=$(TZ=Asia/Shanghai date +%Y%m%d%H%M%S)
          COMMIT_SHA=$(git rev-parse --short HEAD)
          echo "version=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "timestamp=${BUILD_TIMESTAMP}" >> "$GITHUB_OUTPUT"
          echo "commit=${COMMIT_SHA}" >> "$GITHUB_OUTPUT"
          echo "package_name=decotv-${VERSION}-${BUILD_TIMESTAMP}-${COMMIT_SHA}" >> "$GITHUB_OUTPUT"
          echo "Version: v${VERSION}, Build: ${BUILD_TIMESTAMP}, Commit: ${COMMIT_SHA}"

      - name: Build standalone (x86_64)
        if: ${{ !inputs.build_for_arm }}
        env:
          STANDALONE: true
          BUILD_TIMESTAMP: ${{ steps.version.outputs.timestamp }}
          GIT_COMMIT_SHA: ${{ github.sha }}
          GIT_REF_NAME: ${{ github.ref_name }}
        run: pnpm build

      - name: Build standalone (ARM64 cross-compile)
        if: ${{ inputs.build_for_arm }}
        env:
          STANDALONE: true
          BUILD_TIMESTAMP: ${{ steps.version.outputs.timestamp }}
          GIT_COMMIT_SHA: ${{ github.sha }}
          GIT_REF_NAME: ${{ github.ref_name }}
        run: pnpm build

      - name: Assemble deploy package
        run: bash deploy/build.sh --skip-build

      - name: Rename package with version info
        run: |
          cd deploy/dist
          mv decotv-deploy.tar.gz "${{ steps.version.outputs.package_name }}.tar.gz"
          echo "Package: ${{ steps.version.outputs.package_name }}.tar.gz"
          ls -lh *.tar.gz

      - name: Upload deploy package artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ steps.version.outputs.package_name }}
          path: deploy/dist/${{ steps.version.outputs.package_name }}.tar.gz
          retention-days: 30
          if-no-files-found: error

      - name: Upload install scripts
        uses: actions/upload-artifact@v6
        with:
          name: deploy-scripts
          path: |
            deploy/install.sh
            deploy/decotv.sh
            deploy/operit-watchdog.sh
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout source code
        uses: actions/checkout@v5

      - name: Extract version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          COMMIT_SHA=$(git rev-parse --short HEAD)
          echo "version=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "commit=${COMMIT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Download deploy package
        uses: actions/download-artifact@v8
        with:
          pattern: decotv-*
          merge-multiple: true

      - name: Download deploy scripts
        uses: actions/download-artifact@v8
        with:
          name: deploy-scripts

      - name: Create or update nightly release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 查找或创建 nightly release
          RELEASE_TAG="nightly"
          RELEASE_TITLE="DecoTV Nightly Build"

          if ! gh release view "$RELEASE_TAG" --repo "${{ github.repository }}" 2>/dev/null; then
            echo "Creating nightly release..."
            gh release create "$RELEASE_TAG" \
              --repo "${{ github.repository }}" \
              --title "$RELEASE_TITLE" \
              --notes "自动构建的最新版本，每次推送到 main 分支时更新。" \
              --prerelease
          fi

          # 删除旧资源
          gh release delete-asset "$RELEASE_TAG" decotv-*.tar.gz --repo "${{ github.repository }}" 2>/dev/null || true
          gh release delete-asset "$RELEASE_TAG" install.sh --repo "${{ github.repository }}" 2>/dev/null || true
          gh release delete-asset "$RELEASE_TAG" decotv.sh --repo "${{ github.repository }}" 2>/dev/null || true
          gh release delete-asset "$RELEASE_TAG" operit-watchdog.sh --repo "${{ github.repository }}" 2>/dev/null || true

          # 上传新资源
          gh release upload "$RELEASE_TAG" \
            decotv-*.tar.gz \
            install.sh \
            decotv.sh \
            operit-watchdog.sh \
            --repo "${{ github.repository }}" \
            --clobber

          # 更新 release notes
          BUILD_TIMESTAMP=$(TZ=Asia/Shanghai date +%Y%m%d%H%M%S)
          gh release edit "$RELEASE_TAG" \
            --repo "${{ github.repository }}" \
            --notes "自动构建的最新版本，每次推送到 main 分支时更新。

          ## 构建信息
          - 版本: ${{ steps.version.outputs.version }}
          - 提交: ${{ steps.version.outputs.commit }}
          - 时间: ${BUILD_TIMESTAMP}

          ## 手机端部署 (Operit chroot)
          1. 下载 \`decotv-*.tar.gz\`、\`install.sh\`、\`decotv.sh\`、\`operit-watchdog.sh\`
          2. 传输到手机: \`adb push decotv-*.tar.gz /sdcard/Download/\`
          3. Operit Ubuntu 终端中:
             \`\`\`bash
             cd /root
             tar -xzf /sdcard/Download/decotv-*.tar.gz
             bash install.sh
             \`\`\`
          4. 启动: \`/data/decotv/decotv.sh start\`
          5. 访问: http://127.0.0.1:3000"

          echo "Nightly release updated successfully"
